<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$DELUSIONAL</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: Arial, sans-serif;
        }

        /* Video Background */
        #bgVideo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        /* Enter Screen */
        .enter-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            cursor: pointer;
        }

        .enter-text {
            font-size: 1.2rem;
            color: #888;
            letter-spacing: 5px;
            text-transform: uppercase;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .enter-screen.hidden {
            display: none;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 30px;
            z-index: 100;
        }

        .icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            padding: 20px;
            border-radius: 20px;
            transition: all 0.2s ease;
            background: rgba(0, 0, 0, 0.4);
        }

        .icon:hover {
            background: rgba(0, 0, 0, 0.6);
            transform: scale(1.05);
        }

        .icon svg {
            width: 100px;
            height: 100px;
        }

        .icon.tiktok svg {
            fill: #ff0050;
        }

        .icon.x-btn svg {
            fill: #fff;
        }

        .icon span {
            margin-top: 10px;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* PumpFun Button */
        .pumpfun-btn {
            position: fixed;
            bottom: 0;
            right: 0;
            z-index: 100;
        }

        .pumpfun-btn a {
            display: block;
            padding: 25px 80px;
            background: #00d179;
            color: #000;
            text-decoration: none;
            font-size: 1.3rem;
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-radius: 0;
            transition: all 0.3s ease;
        }

        .pumpfun-btn a:hover {
            background: #00e887;
        }

        /* Learn More Button */
        .learn-more {
            position: fixed;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
        }

        .learn-more a {
            display: block;
            padding: 20px 40px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.4);
            color: #fff;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .learn-more a:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.6);
            transform: scale(1.05);
        }

        /* CA Coming Soon */
        .ca-text {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 3px;
            text-transform: uppercase;
            z-index: 100;
        }
    </style>
</head>
<body>
    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <video id="bgVideo" loop muted playsinline>
        <source src="background.mp4" type="video/mp4">
    </video>

    <!-- Click to Enter -->
    <div class="enter-screen" id="enterScreen">
        <div class="enter-text">click to enter</div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
        <a href="#" class="icon tiktok" id="tiktokLink" target="_blank">
            <svg viewBox="0 0 48 48">
                <path d="M34.1,10.5c-2.3-1.5-3.9-4-4.1-6.8l0-0.7h-6.2l0,26.4c0,3.6-2.9,6.5-6.5,6.5c-3.6,0-6.5-2.9-6.5-6.5
                c0-3.6,2.9-6.5,6.5-6.5c0.7,0,1.3,0.1,1.9,0.3v-6.3c-0.6-0.1-1.3-0.1-1.9-0.1c-7,0-12.7,5.7-12.7,12.7s5.7,12.7,12.7,12.7
                s12.7-5.7,12.7-12.7V18c2.5,1.8,5.5,2.8,8.8,2.8v-6.2C36.9,14.6,35.2,12.9,34.1,10.5z"/>
            </svg>
            <span>TikTok</span>
        </a>

        <a href="https://x.com/delus1onalpump" class="icon x-btn" target="_blank">
            <svg viewBox="0 0 24 24">
                <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
            </svg>
            <span>X</span>
        </a>
    </div>

    <!-- Bottom Button -->
    <div class="pumpfun-btn">
        <a href="#" target="_blank">$DELUSIONAL</a>
    </div>

    <!-- Learn More -->
    <div class="learn-more">
        <a href="about.html">learn more</a>
    </div>

    <!-- CA Coming Soon -->
    <div class="ca-text">CA : Coming Soon</div>

    <script>
        const enterScreen = document.getElementById('enterScreen');
        const music = document.getElementById('bgMusic');
        const video = document.getElementById('bgVideo');

        enterScreen.onclick = () => {
            music.play();
            video.play();
            enterScreen.classList.add('hidden');
        };
    </script>
</body>
</html>
