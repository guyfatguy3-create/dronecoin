<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$DRONE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background-image: url('drone.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .sidebar {
            position: fixed;
            left: 15px;
            top: 15px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            padding: 8px;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .icon:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.1);
        }

        .icon svg {
            width: 35px;
            height: 35px;
            fill: #fff;
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5));
        }

        .icon .question {
            font-size: 2rem;
            font-weight: bold;
            color: #fff;
            font-family: Arial, sans-serif;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        .icon span {
            margin-top: 4px;
            font-size: 10px;
            color: #fff;
            font-family: Arial, sans-serif;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        .music-btn {
            position: fixed;
            bottom: 15px;
            right: 15px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            border: none;
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .music-btn:hover {
            background: rgba(0, 0, 0, 0.7);
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="sidebar">
        <a href="https://x.com/DroneCoinX" class="icon" target="_blank">
            <svg viewBox="0 0 24 24">
                <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
            </svg>
            <span>X</span>
        </a>

        <a href="https://www.urbandictionary.com/define.php?term=Drone" class="icon" target="_blank">
            <div class="question">?</div>
            <span>wtf is this</span>
        </a>
    </div>

    <button class="music-btn" id="musicBtn">🔇</button>

    <script>
        const music = document.getElementById('bgMusic');
        const btn = document.getElementById('musicBtn');
        let playing = false;

        btn.onclick = () => {
            if (playing) {
                music.pause();
                btn.textContent = '🔇';
            } else {
                music.play();
                btn.textContent = '🔊';
            }
            playing = !playing;
        };
    </script>
</body>
</html>
